{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto">
  <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
    <h1 class="text-xl font-bold">Entrar</h1>
    <p class="text-sm text-slate-600 mt-1">Acesse para gerenciar tarefas e lembretes.</p>

    <form class="mt-6 space-y-4" method="post">
      <div>
        <label class="text-sm font-medium">E-mail ou Usuário</label>
        <input name="email" type="text" class="mt-1 w-full rounded-xl border-slate-200" required>
      </div>
      <div>
        <label class="text-sm font-medium">Senha</label>
        <input name="senha" type="password" class="mt-1 w-full rounded-xl border-slate-200" required>
      </div>

      <button class="w-full py-2.5 rounded-xl bg-teal-700 text-white font-semibold hover:bg-teal-800">
        Entrar
      </button>
    </form>

    <div class="mt-4 text-sm text-slate-600">
      Não tem conta?
      <a class="text-teal-700 font-semibold" href="{{ url_for('registrar') }}">Criar agora</a>
    </div>

    <div class="mt-6 text-xs text-slate-500">
      Dica: instale como app pelo menu do navegador (“Instalar app”).
    </div>
  </div>
</div>
{% endblock %}
