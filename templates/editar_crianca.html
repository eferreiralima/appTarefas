{% extends "base.html" %}
{% block content %}
<div class="max-w-xl mx-auto">

  <div class="mb-4 flex items-center gap-2">
    <a href="{{ url_for('criancas') }}" class="text-sm text-slate-500 hover:text-teal-700">← Voltar para perfis</a>
  </div>

  <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
    <h1 class="text-2xl font-bold">Editar Perfil</h1>
    <p class="text-sm text-slate-600 mt-1">Atualize as informações de {{ crianca.nome }}.</p>

    <form class="mt-6 space-y-4" method="post">
      <div>
        <label class="text-sm font-medium">Nome</label>
        <input name="nome" value="{{ crianca.nome }}" class="mt-1 w-full rounded-xl border-slate-200" required>
      </div>
      <div>
        <label class="text-sm font-medium">Apelido</label>
        <input name="apelido" value="{{ crianca.apelido or '' }}" class="mt-1 w-full rounded-xl border-slate-200">
      </div>

      <div class="mt-6 pt-6 border-t border-slate-100">
        <h3 class="text-sm font-bold text-slate-700 mb-1">Acesso da Criança</h3>
        {% if email_crianca %}
          <p class="text-sm text-slate-600 mb-3">Usuário atual: <span class="font-semibold">{{ email_crianca }}</span></p>
        {% else %}
          <p class="text-sm text-amber-600 mb-3">Este perfil não possui um login cadastrado.</p>
        {% endif %}
        
        <label class="text-sm font-medium">Nova Senha <span class="text-slate-400 font-normal">(deixe em branco para não alterar)</span></label>
        <input name="nova_senha" type="password" class="mt-1 w-full rounded-xl border-slate-200" placeholder="Digite apenas se quiser mudar">
      </div>

      <div class="mt-6 pt-2">
        <button class="w-full py-3 rounded-xl bg-teal-700 text-white font-semibold hover:bg-teal-800">
          Salvar alterações
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
